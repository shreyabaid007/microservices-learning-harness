services:
  identity-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d identity_db"]
      interval: 2s
      timeout: 3s
      retries: 20

  task-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_db"]
      interval: 2s
      timeout: 3s
      retries: 20

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://identity-db:5432/identity_db
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      JWT_EXPIRATION_MS: 3600000
    ports:
      - "8080:8080"
    depends_on:
      identity-db:
        condition: service_healthy

  task-service:
    build:
      context: .
      dockerfile: task-service/Dockerfile
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://task-db:5432/task_db
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      IDENTITY_JWKS_URI: http://identity-service:8080/.well-known/jwks.json
    ports:
      - "8081:8081"
    depends_on:
      task-db:
        condition: service_healthy
      identity-service:
        condition: service_started
